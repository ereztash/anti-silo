name: Build macOS app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install builder
        run: python -m pip install -e ".[desktop]"
      - name: Build app bundle
        run: pyinstaller --noconfirm packaging/anti_silo_gui.spec
      - name: Import Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' }}
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p temporary build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p temporary build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temporary build.keychain
          security list-keychain -d user -s build.keychain
      - name: Sign app bundle
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_SIGNING_IDENTITY != '' }}
        run: codesign --force --deep --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" dist/Anti-Silo.app
      - name: Create DMG
        run: hdiutil create -volname "Anti-Silo" -srcfolder dist/Anti-Silo.app -ov -format UDZO dist/Anti-Silo-macOS.dmg
      - name: Notarize and staple DMG
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcrun notarytool submit dist/Anti-Silo-macOS.dmg --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple dist/Anti-Silo-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Anti-Silo-macOS
          path: dist/Anti-Silo-macOS.dmg
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Anti-Silo-macOS.dmg
