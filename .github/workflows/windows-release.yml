name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install builder
        run: python -m pip install -e ".[desktop]"
      - name: Build portable executable
        run: pyinstaller --noconfirm packaging/anti_silo_gui.spec
      - name: Assemble download
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\Anti-Silo-Windows | Out-Null
          Copy-Item dist\Anti-Silo.exe dist\Anti-Silo-Windows\Anti-Silo.exe
          Copy-Item packaging\INSTALL-WINDOWS.txt dist\Anti-Silo-Windows\README.txt
          Copy-Item packaging\windows_context_menu.ps1 dist\Anti-Silo-Windows\windows_context_menu.ps1
          Compress-Archive -Path dist\Anti-Silo-Windows\* -DestinationPath dist\Anti-Silo-Windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: Anti-Silo-Windows
          path: dist/Anti-Silo-Windows.zip
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Anti-Silo-Windows.zip
