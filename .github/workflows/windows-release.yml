name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
      AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install builder
        run: python -m pip install -e ".[desktop]"
      - name: Build portable executable
        run: pyinstaller --noconfirm packaging/anti_silo_gui.spec
      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\Anti-Silo.iss
      - name: Sign Windows executable with Azure Artifact Signing
        if: ${{ env.AZURE_TENANT_ID != '' && env.AZURE_CLIENT_ID != '' && env.AZURE_CLIENT_SECRET != '' && env.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && env.AZURE_CODE_SIGNING_NAME != '' && env.AZURE_CERT_PROFILE_NAME != '' }}
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ env.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: Anti-Silo*.exe
      - name: Assemble download
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\Anti-Silo-Windows | Out-Null
          Copy-Item dist\Anti-Silo.exe dist\Anti-Silo-Windows\Anti-Silo.exe
          Copy-Item packaging\INSTALL-WINDOWS.txt dist\Anti-Silo-Windows\README.txt
          Copy-Item packaging\windows_context_menu.ps1 dist\Anti-Silo-Windows\windows_context_menu.ps1
          Compress-Archive -Path dist\Anti-Silo-Windows\* -DestinationPath dist\Anti-Silo-Windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: Anti-Silo-Windows
          path: dist/Anti-Silo-Windows.zip
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Anti-Silo-Setup.exe
            dist/Anti-Silo-Windows.zip
